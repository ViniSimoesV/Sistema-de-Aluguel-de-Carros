<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente - Aluguel de Carros</title>
    <link rel="stylesheet" href="../css/styleCadastro.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <script src="../js/navbar.js"></script>

    <div class="container">
        <h2>Novo Cadastro de Cliente</h2>
        <form id="formCadastro">
            <div class="form-group">
                <label>Nome Completo:</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label>CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="form-group">
                <label>RG:</label>
                <input type="text" id="rg" required>
            </div>
            <div class="form-group">
                <label>Profissão:</label>
                <input type="text" id="profissao" required>
            </div>
            <div class="form-group">
                <label>Empresa atual:</label>
                <input type="text" id="emprego" required>
            </div>
            <button type="submit">Salvar Cliente</button>
            <a href="clientes.html">Voltar</a>
        </form>
    </div>
    <script src="../js/cadastro_cliente.js"></script>
</body>
</html>
