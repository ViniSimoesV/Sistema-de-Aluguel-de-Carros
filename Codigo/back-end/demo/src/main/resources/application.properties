#Tue Apr 07 20:24:50 UTC 2026
micronaut.application.name=demo

#datasources.default.url=jdbc:postgresql://db.fwulpocpojcdgdpxubng.supabase.co:5432/postgres
datasources.default.url=${JDBC_URL}
datasources.default.driverClassName=org.postgresql.Driver
#datasources.default.username=postgres
datasources.default.username=${DB_USER}
#datasources.default.password=Projeto_lab2
datasources.default.password=${DB_PASSWORD}
datasources.default.dialect=POSTGRES
# 'update' tenta criar as tabelas se elas não existirem
jpa.default.properties.hibernate.hbm2ddl.auto=update

# Resolve o conflito de prepared statements no PostgreSQL/Supabase
datasources.default.properties.prepareThreshold=0

# Configurações de CORS para permitir acesso do front-end
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origins=https://horizontes-aluguel.vercel.app
micronaut.server.cors.configurations.web.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
micronaut.server.cors.configurations.web.allowed-headers=Content-Type,Authorization