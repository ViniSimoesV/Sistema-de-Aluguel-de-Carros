<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Aluguéis - Horizontes</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/navbar.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="../js/navbar.js" defer></script>
    <script src="../js/alugueisCliente.js" defer></script>
</head>
<body>

    <div class="content">
        <div class="page-header">
            <h2>Meus Aluguéis</h2>
            <p>Acompanhe aqui o status dos seus veículos alugados.</p>
        </div>

        <div class="table-container">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Veículo</th>
                        <th>Placa</th>
                        <th>Data Retirada</th>
                        <th>Previsão Entrega</th>
                        <th>Valor Total</th>
                        <th>Status</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr>
                        <td colspan="7" style="text-align: center;">Buscando seus aluguéis...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Editar Aluguel</h3>
                <span class="close-modal" id="btnFecharModal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="formEditarAluguel">
                    <input type="hidden" id="editIdPedido">
                    <label>Data de Retirada</label>
                    <input type="date" id="editDataInicio">
                    
                    <label>Previsão de Entrega</label>
                    <input type="date" id="editDataFim">
                    
                    <div class="modal-footer">
                        <button type="button" class="btn-edit-outline" id="btnCancelar">Cancelar</button>
                        <button type="submit" class="btn-main" id="btnCSalvar" style="margin-top:0">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
