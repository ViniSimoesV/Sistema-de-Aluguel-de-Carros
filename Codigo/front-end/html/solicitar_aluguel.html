<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Aluguel - Horizontes</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/styleSolicitar.css">
    <link rel="stylesheet" href="../css/navbar.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="../js/solicitaraluguel.js"></script>
    <script src="../js/navbar.js" defer></script>
</head>
<body>

    <div class="content">
        <div class="page-header">
            <h2>Solicitar Novo Aluguel</h2>
            <p>Encontre o veículo ideal para sua próxima jornada.</p>
        </div>

        <div class="search-container">
            <div class="filter-row">
                <div class="filter-group">
                    <label><i class="fas fa-calendar-alt"></i> Retirada e Devolução</label>
                    <div class="date-input-group">
                        <input type="date" title="Data Início">
                        <input type="date" title="Data Fim">
                    </div>
                </div>
                <button class="btn-search"><i class="fas fa-search"></i> Procurar</button>
            </div>
        </div>

        <div class="available-cars">
            <h3 class="section-title">Veículos Disponíveis</h3>
            <div id="car-list-container">
            </div>
        </div>
    </div>

</body>
</html>
