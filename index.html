<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Cadastro - Horizontes </title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap">
    <link rel="stylesheet" href="/Código/front-end/css/styleLogin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/Código/front-end/js/cadastro.js"></script>
</head>
<body>
    <div class="login-container" id="container">
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Já tem uma conta?</h1>
                    <p>Faça login com seus dados pessoais</p>
                    <button class="ghost" id="signIn">Entrar</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Novo por aqui?</h1>
                    <p>Insira seus dados e comece sua jornada conosco</p>
                    <button class="ghost" id="signUp">Cadastrar</button>
                </div>
            </div>
        </div>

        <div class="form-container sign-in-container">
            <form action="#">
                <h1 class="logo">Horizontes</h1>
                <h2>Entrar</h2>
                <br>
                <span>ou use seu CPF/CNPJ</span>
                <input type="text" placeholder="CPF ou CNPJ" />
                <input type="password" placeholder="Senha" />
                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
                <button type="submit" class="btn-main">Entrar</button>
            </form>
        </div>

        <div class="form-container sign-up-container">
            <form id="formCadastro">
                <h2>Criar Conta</h2>
                <div class="scrollable-form">
                    <input type="text" id="identificador" placeholder="CPF ou CNPJ" required />
                    
                    <input type="text" id="nome" placeholder="Nome Completo / Razão Social" required />
                    <input type="email" id="email" placeholder="E-mail" required />
                    <input type="text" id="telefone" placeholder="Telefone" required />

                    <div id="camposCliente">
                        <div class="input-group">
                            <input type="text" id="rg" placeholder="RG" />
                            <input type="date" id="dataNascimento" title="Data de Nascimento" placeholder="Data de Nascimento" />
                        </div>
                        <div class="input-group">   
                            <input type="text" id="emprego" placeholder="Emprego" />
                            <input type="number" id="rendimento" placeholder="Renda Mensal" />
                        </div>

                        <input type="text" id="entidadeEmpregadora" placeholder="Entidade Empregadora" />
                                            
                        <p class="section-title">Endereço Residencial</p>
                        <div class="input-group">
                            <input type="text" id="rua" placeholder="Rua" style="flex: 2;"/>
                            <input type="text" id="numero" placeholder="Nº" style="flex: 0.5;"/>
                        </div>
                        <div class="input-group">
                            <input type="text" id="complemento" placeholder="Complemento" />
                            <input type="text" id="bairro" placeholder="Bairro" />
                        </div>
                        <input type="text" id="cidade" placeholder="Cidade" />
                    </div>

                    <div id="camposAgente" style="display: none;">
                        <input type="text" id="compe" placeholder="Código COMPE (Banco)" />
                        <select id="tipoAgente" class="field-select" style="margin-bottom: 15px;">
                            <option value="empresa">Empresa de Locação</option>
                            <option value="banco">Instituição Financeira (Banco)</option>
                        </select>
                    </div>
                    
                    <p class="section-title">Senha</p>
                    <input type="password" id="senha" placeholder="Senha" required />
                    <button type="submit" class="btn-main">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>

    
</body>
</html>
